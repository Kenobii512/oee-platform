<!doctype html>
<!-- Sosyal önizleme kartı kaynağı (1200×630). PNG üretimi: bu sayfa 1200×630
     viewport'ta ekran görüntüsü alınır -> og-card.png. Elle bakım; servis edilmez. -->
<html lang="tr">
<head>
<meta charset="utf-8">
<style>
  * { box-sizing: border-box; margin: 0; }
  body { width: 1200px; height: 630px; background: #edf1f5; color: #16202b;
         font-family: Archivo, "Segoe UI", system-ui, sans-serif; overflow: hidden; }
  .card { height: 100%; padding: 64px 72px; display: flex; flex-direction: column;
          justify-content: space-between; position: relative; }
  .kicker { font-size: 20px; font-weight: 700; letter-spacing: 0.2em;
            text-transform: uppercase; color: #1f5da6; }
  h1 { font-size: 76px; font-weight: 800; letter-spacing: -0.015em; line-height: 1.04;
       margin-top: 18px; max-width: 760px; }
  /* Gövde: PJS (DESIGN.md body) — display Archivo'dan ayrışır (uygulamadaki eşleşme). */
  .sub { margin-top: 22px; font-size: 26px; color: #58626f; max-width: 680px; line-height: 1.45;
         font-family: "Plus Jakarta Sans", "Segoe UI", system-ui, sans-serif; font-weight: 400; }
  .foot { display: flex; gap: 14px; align-items: center; font-size: 21px; color: #58626f;
          font-family: "Plus Jakarta Sans", "Segoe UI", system-ui, sans-serif; }
  .chip { background: #ffffff; border: 1px solid #e2e7ec; border-radius: 8px;
          padding: 8px 16px; font-weight: 700; }
  .bar { position: absolute; left: 0; top: 0; bottom: 0; width: 14px; background: #1f5da6; }
  .gauge { position: absolute; right: 64px; top: 120px; }
</style>
</head>
<body>
<div class="card">
  <div class="bar"></div>
  <div>
    <div class="kicker">OEE Platform · Kaplama Hatları</div>
    <h1>Hattınız nerede para yakıyor?</h1>
    <div class="sub">Kayıp ağacı → TL Pareto → öneri. İki haftalık pilotla, güven aralıklı,
    abartısız.</div>
  </div>
  <svg class="gauge" viewBox="0 0 300 210" width="330" aria-hidden="true">
    <path d="M 35 180 A 115 115 0 0 1 265 180" fill="none" stroke="#e2e7ec" stroke-width="24" stroke-linecap="round"/>
    <path d="M 35 180 A 115 115 0 0 1 178 68" fill="none" stroke="#1f5da6" stroke-width="24" stroke-linecap="round"/>
    <text x="150" y="152" text-anchor="middle" style="font:800 58px Archivo, system-ui" fill="#16202b">60,1%</text>
    <text x="150" y="182" text-anchor="middle" style="font:700 17px Archivo, system-ui; letter-spacing:3px" fill="#58626f">OEE</text>
  </svg>
  <div class="foot">
    <span class="chip">FastAPI + DuckDB</span>
    <span class="chip">React 19</span>
    <span class="chip">SSE Replay</span>
    <span class="chip">DES Simülatör</span>
  </div>
</div>
</body>
</html>
