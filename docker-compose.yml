services:
  oee-platform:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - OEE_DUCKDB_PATH=/data/oee.duckdb
      # Demo: açılışta baseline senaryosunu otomatik yükle (dolu pano).
      - SAMPLE_DATA_DIR=/app/tests/fixtures/scenarios/baseline
    volumes:
      - oee-data:/data
volumes:
  oee-data:
