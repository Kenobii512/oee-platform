# Render Blueprint — tek Docker web servisi (mevcut çok-aşamalı Dockerfile ile).
# Kurulum: Render Dashboard → New → Blueprint → bu repoyu seç → Apply.
# Render $PORT enjekte eder; Dockerfile CMD bunu dinler. DuckDB ephemeral (/app/oee.duckdb),
# her açılışta SAMPLE_DATA_DIR'den baseline yeniden yüklenir → kalıcı disk gerekmez (demo).
services:
  - type: web
    name: oee-platform
    runtime: docker
    repo: https://github.com/Kenobii512/oee-platform
    branch: main
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .
    region: frankfurt
    plan: free
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: SAMPLE_DATA_DIR
        value: /app/tests/fixtures/scenarios/baseline
      # Erişim katmanı (form-tabanlı giriş). OEE_AUTH_PASS Render dashboard'da girilir;
      # BOŞ bırakılırsa auth KAPALI (pano herkese açık). Doldurulursa giriş ekranı devreye girer.
      - key: OEE_AUTH_USER
        value: admin
      - key: OEE_AUTH_PASS
        sync: false          # secret — Render Dashboard → Environment'tan gir
      - key: OEE_AUTH_SECRET
        generateValue: true  # çerez imza anahtarı (Render otomatik üretir)
      # İngest yolu kısıtı: auth KAPALI kalsa bile POST /ingest yalnız bu kökün
      # altındaki dizinleri okuyabilir (keyfi sunucu dizini okutulamaz).
      - key: OEE_INGEST_ROOT
        value: /app/tests/fixtures
